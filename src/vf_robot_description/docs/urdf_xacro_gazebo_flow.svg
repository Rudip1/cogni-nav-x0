<?xml version="1.0" encoding="UTF-8"?>
<svg width="860" height="620" viewBox="0 0 860 620"
     xmlns="http://www.w3.org/2000/svg"
     font-family="ui-sans-serif, system-ui, sans-serif">

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="860" height="620" fill="#ffffff"/>

  <!-- ═══════════════ TITLE ═══════════════ -->
  <text x="430" y="30" text-anchor="middle" font-size="14"
        font-weight="700" fill="#1a1a1a">
    URDF vs Xacro — paths to RViz and Gazebo
  </text>
  <line x1="40" y1="40" x2="820" y2="40" stroke="#d0cec6" stroke-width="0.8"/>

  <!-- ═══════════════ COLUMN HEADERS ═══════════════ -->
  <!-- Xacro column header -->
  <rect x="40" y="50" width="360" height="28" rx="6"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="220" y="68" text-anchor="middle" font-size="12"
        font-weight="700" fill="#3C3489">Xacro  (recommended)</text>

  <!-- URDF column header -->
  <rect x="460" y="50" width="360" height="28" rx="6"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="640" y="68" text-anchor="middle" font-size="12"
        font-weight="700" fill="#444441">Plain URDF  (legacy / fallback)</text>

  <!-- ═══════════════ SOURCE FILES ═══════════════ -->
  <!-- Xacro source -->
  <rect x="100" y="96" width="240" height="52" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="220" y="117" text-anchor="middle" font-size="12"
        font-weight="700" fill="#3C3489">uvc1_virofighter.xacro</text>
  <text x="220" y="135" text-anchor="middle" font-size="10"
        fill="#534AB7">includes sensors.xacro + common_properties.xacro</text>

  <!-- URDF source -->
  <rect x="510" y="96" width="240" height="52" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="630" y="117" text-anchor="middle" font-size="12"
        font-weight="700" fill="#2C2C2A">uvc1_virofighter.urdf</text>
  <text x="630" y="135" text-anchor="middle" font-size="10"
        fill="#5F5E5A">flat file — all links, joints, plugins inline</text>

  <!-- divider label -->
  <line x1="430" y1="50" x2="430" y2="590" stroke="#d0cec6"
        stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="430" y="45" text-anchor="middle" font-size="10" fill="#aaa">│</text>

  <!-- ═══════════════ XACRO → RVIZ (direct) ═══════════════ -->
  <line x1="220" y1="148" x2="140" y2="194"
        stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="152" y="183" font-size="9" fill="#0F6E56">launch time</text>
  <text x="152" y="194" font-size="9" fill="#0F6E56">xacro cmd</text>

  <rect x="40" y="196" width="200" height="52" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="140" y="217" text-anchor="middle" font-size="12"
        font-weight="700" fill="#085041">RViz2</text>
  <text x="140" y="234" text-anchor="middle" font-size="10"
        fill="#0F6E56">robot_state_publisher + rviz2</text>

  <!-- ═══════════════ XACRO → GAZEBO (direct) ═══════════════ -->
  <line x1="300" y1="148" x2="340" y2="194"
        stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="308" y="183" font-size="9" fill="#993C1D">robot_description</text>
  <text x="308" y="194" font-size="9" fill="#993C1D">param in launch</text>

  <rect x="260" y="196" width="200" height="52" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="360" y="217" text-anchor="middle" font-size="12"
        font-weight="700" fill="#4A1B0C">Gazebo Classic</text>
  <text x="360" y="234" text-anchor="middle" font-size="10"
        fill="#712B13">spawns robot, runs physics + plugins</text>

  <!-- ═══════════════ URDF → RVIZ ONLY ═══════════════ -->
  <line x1="630" y1="148" x2="630" y2="194"
        stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="638" y="178" font-size="9" fill="#0F6E56">cat urdf | RSP</text>

  <rect x="510" y="196" width="240" height="52" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="630" y="217" text-anchor="middle" font-size="12"
        font-weight="700" fill="#085041">RViz2 only</text>
  <text x="630" y="234" text-anchor="middle" font-size="10"
        fill="#0F6E56">robot_state_publisher + rviz2</text>

  <!-- URDF → Gazebo blocked -->
  <line x1="630" y1="248" x2="740" y2="282"
        stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="740" y="280" width="80" height="28" rx="6"
        fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.8"/>
  <text x="780" y="299" text-anchor="middle" font-size="10"
        font-weight="700" fill="#A32D2D">NOT ALLOWED</text>
  <text x="700" y="275" font-size="9" fill="#A32D2D">Gazebo rejects raw URDF</text>

  <!-- ═══════════════ DIVIDER ═══════════════ -->
  <line x1="40" y1="310" x2="820" y2="310" stroke="#d0cec6" stroke-width="0.8"/>
  <rect x="240" y="300" width="380" height="20" rx="10" fill="#ffffff"/>
  <text x="430" y="314" text-anchor="middle" font-size="11"
        font-weight="600" fill="#888780">
    Optional offline conversion: xacro or URDF → model.sdf
  </text>

  <!-- ═══════════════ SDF CONVERSION (left: xacro) ═══════════════ -->
  <line x1="220" y1="148" x2="220" y2="330"
        stroke="#BA7517" stroke-width="1.2" stroke-dasharray="4 3"/>
  <!-- arrow from dashed to converter -->
  <line x1="160" y1="346" x2="160" y2="362"
        stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="330" width="220" height="32" rx="6"
        fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="170" y="351" text-anchor="middle" font-size="11"
        font-weight="700" fill="#412402">xacro_to_sdf.sh</text>

  <line x1="170" y1="362" x2="170" y2="392"
        stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SDF conversion (right: urdf) -->
  <line x1="630" y1="248" x2="520" y2="330"
        stroke="#BA7517" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="520" y1="346" x2="520" y2="362"
        stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="420" y="330" width="220" height="32" rx="6"
        fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="530" y="351" text-anchor="middle" font-size="11"
        font-weight="700" fill="#412402">urdf_to_sdf.sh</text>

  <line x1="530" y1="362" x2="530" y2="392"
        stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════ model.sdf ═══════════════ -->
  <rect x="270" y="392" width="320" height="44" rx="8"
        fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="430" y="409" text-anchor="middle" font-size="12"
        font-weight="700" fill="#2C2C2A">model.sdf</text>
  <text x="430" y="426" text-anchor="middle" font-size="10"
        fill="#444441">
    vf_robot_gazebo/models/uvc1_virofighter/model.sdf
  </text>

  <!-- merge xacro converter line to model.sdf -->
  <line x1="170" y1="392" x2="270" y2="414"
        stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>
  <!-- merge urdf converter line to model.sdf -->
  <line x1="530" y1="392" x2="590" y2="414"
        stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ═══════════════ model.sdf → two destinations ═══════════════ -->
  <line x1="350" y1="436" x2="240" y2="480"
        stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="510" y1="436" x2="610" y2="480"
        stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SDF → RViz -->
  <rect x="100" y="480" width="280" height="52" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="240" y="501" text-anchor="middle" font-size="12"
        font-weight="700" fill="#085041">RViz2</text>
  <text x="240" y="519" text-anchor="middle" font-size="10"
        fill="#0F6E56">load resolved URDF (byproduct of conversion)</text>

  <!-- SDF → Gazebo -->
  <rect x="480" y="480" width="280" height="52" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="620" y="501" text-anchor="middle" font-size="12"
        font-weight="700" fill="#4A1B0C">Gazebo Classic</text>
  <text x="620" y="519" text-anchor="middle" font-size="10"
        fill="#712B13">reads model.sdf directly</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <rect x="40" y="552" width="780" height="56" rx="6"
        fill="#F8F7F3" stroke="#d0cec6" stroke-width="0.6"/>
  <text x="60" y="570" font-size="11" font-weight="700" fill="#2C2C2A">Legend</text>
  <line x1="110" y1="567" x2="145" y2="567" stroke="#1D9E75"
        stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="150" y="571" font-size="10" fill="#1a1a1a">→ RViz path</text>
  <line x1="240" y1="567" x2="275" y2="567" stroke="#D85A30"
        stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="280" y="571" font-size="10" fill="#1a1a1a">→ Gazebo path</text>
  <line x1="380" y1="567" x2="415" y2="567" stroke="#BA7517"
        stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="420" y="571" font-size="10" fill="#1a1a1a">→ optional offline conversion</text>
  <line x1="580" y1="567" x2="615" y2="567" stroke="#E24B4A"
        stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="620" y="571" font-size="10" fill="#A32D2D">✗ blocked path</text>

  <text x="60" y="593" font-size="10" fill="#5F5E5A">
    Xacro → Gazebo direct (top right) uses robot_description param — Gazebo reads the URDF string from ROS parameter, not from disk.
  </text>

  <!-- footer -->
  <text x="430" y="613" text-anchor="middle" font-size="9" fill="#B4B2A9">
    cogni-nav-x0 / vf_robot_description — EUROKNOWS CO., LTD. — Apache 2.0
  </text>

</svg>
