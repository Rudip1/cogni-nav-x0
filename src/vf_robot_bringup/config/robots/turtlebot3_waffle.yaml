# =============================================================================
# vf_robot_bringup / config / robots / turtlebot3_waffle.yaml
# =============================================================================
# Robot profile for the TurtleBot3 Waffle Pi.
#
# Why this file exists in the ViroFighter bringup package:
#
#   The thesis claims that the VF Robot Controller is a portable Nav2
#   plugin that works on any differential-drive robot. This profile is
#   the demonstration of that claim — switching from ViroFighter to TB3
#   is a single launch argument:
#
#       robot:=virofighter   →   robot:=turtlebot3_waffle
#
#   Same controller fragments, same nav2_base.yaml, same launch files.
#   Only this file changes the robot.
#
# DIFFERENCES FROM virofighter.yaml:
#   - TB3 uses robot_radius (round robot), not a polygon footprint
#   - Smaller (0.281 × 0.306 m vs 0.6 × 0.4 m)
#   - Lower max velocity (0.22 vs 0.30 m/s — TB3 hardware cap)
#   - Lower max acceleration (no UVC tubes to oscillate)
#   - No 3D depth camera, so use_3d_clearance: false
#   - /scan from a real LiDAR, not from depth_to_scan
#
# SAME AS virofighter.yaml:
#   - base_footprint frame convention
#   - 10 VF critic set
#   - All other Nav2 nodes (BT, costmap layers, behaviors, smoother, ...)
# =============================================================================

robot:
  name: TurtleBot3 Waffle Pi
  description: >-
    Small round differential-drive research robot. Used here as a
    portability validation target for the VF Robot Controller plugin.
  base_frame: base_footprint
  odom_frame: odom
  map_frame: map
  chassis_length_m: 0.281
  chassis_width_m: 0.306
  height_max_m: 0.40
  wheel_separation_m: 0.287
  wheel_diameter_m: 0.066
  drive_type: differential
  has_3d_sensor: false
  primary_depth_camera: null      # TB3 uses 2D LiDAR, no depth camera
  scan_source: lidar              # real LDS-01 / LDS-02 LiDAR

# =============================================================================
# REWRITES — always applied, regardless of controller choice
# =============================================================================
rewrites:

  # ───────────────────────────────────────────────────────────────────────────
  # Frames
  # ───────────────────────────────────────────────────────────────────────────
  bt_navigator.ros__parameters.robot_base_frame:                  base_footprint
  behavior_server.ros__parameters.robot_base_frame:               base_footprint
  local_costmap.local_costmap.ros__parameters.robot_base_frame:   base_footprint
  global_costmap.global_costmap.ros__parameters.robot_base_frame: base_footprint
  collision_monitor.ros__parameters.base_frame_id:                base_footprint

  # ───────────────────────────────────────────────────────────────────────────
  # Footprint — TB3 is round, so use robot_radius and leave footprint empty.
  # This is the OPPOSITE choice from virofighter.yaml (which uses a polygon).
  # nav2_base.yaml has both keys with placeholder defaults; profiles pick one.
  # ───────────────────────────────────────────────────────────────────────────
  local_costmap.local_costmap.ros__parameters.robot_radius:       0.22
  global_costmap.global_costmap.ros__parameters.robot_radius:     0.22
  local_costmap.local_costmap.ros__parameters.footprint:          ""
  global_costmap.global_costmap.ros__parameters.footprint:        ""

  # ───────────────────────────────────────────────────────────────────────────
  # Local costmap — TB3 sees ~3.5 m with the LDS LiDAR
  # ───────────────────────────────────────────────────────────────────────────
  local_costmap.local_costmap.ros__parameters.width:  3
  local_costmap.local_costmap.ros__parameters.height: 3
  local_costmap.local_costmap.ros__parameters.inflation_layer.inflation_radius:    0.55
  local_costmap.local_costmap.ros__parameters.inflation_layer.cost_scaling_factor: 3.0
  local_costmap.local_costmap.ros__parameters.voxel_layer.scan.obstacle_max_range: 2.5
  local_costmap.local_costmap.ros__parameters.voxel_layer.scan.raytrace_max_range: 3.0
  local_costmap.local_costmap.ros__parameters.voxel_layer.max_obstacle_height:     2.0

  # ───────────────────────────────────────────────────────────────────────────
  # Global costmap
  # ───────────────────────────────────────────────────────────────────────────
  global_costmap.global_costmap.ros__parameters.inflation_layer.inflation_radius:    0.55
  global_costmap.global_costmap.ros__parameters.inflation_layer.cost_scaling_factor: 3.0
  global_costmap.global_costmap.ros__parameters.obstacle_layer.scan.obstacle_max_range: 2.5
  global_costmap.global_costmap.ros__parameters.obstacle_layer.scan.raytrace_max_range: 3.0

  # ───────────────────────────────────────────────────────────────────────────
  # Velocity smoother — TB3 hardware limit is 0.22 m/s, 2.84 rad/s
  # ───────────────────────────────────────────────────────────────────────────
  velocity_smoother.ros__parameters.max_velocity: [0.22, 0.0, 1.0]
  velocity_smoother.ros__parameters.min_velocity: [-0.22, 0.0, -1.0]
  velocity_smoother.ros__parameters.max_accel:    [2.5,  0.0, 3.2]
  velocity_smoother.ros__parameters.max_decel:    [-2.5, 0.0, -3.2]

  # ───────────────────────────────────────────────────────────────────────────
  # Collision monitor — small robot can react closer to collision
  # ───────────────────────────────────────────────────────────────────────────
  collision_monitor.ros__parameters.FootprintApproach.time_before_collision: 1.2

  # ───────────────────────────────────────────────────────────────────────────
  # Goal checker
  # ───────────────────────────────────────────────────────────────────────────
  controller_server.ros__parameters.general_goal_checker.xy_goal_tolerance:  0.25
  controller_server.ros__parameters.general_goal_checker.yaw_goal_tolerance: 0.25


# =============================================================================
# CONTROLLER-FAMILY-SPECIFIC OVERRIDES
# =============================================================================
# Same structure as virofighter.yaml — see that file for the rationale.
# =============================================================================
controller_overrides:

  # ──────────────────────────────────────────────────────────────────────────
  # VF Robot Controller (any vf_* fragment)
  # ──────────────────────────────────────────────────────────────────────────
  vf:
    controller_server.ros__parameters.FollowPath.robot_length:     0.281
    controller_server.ros__parameters.FollowPath.robot_width:      0.306
    controller_server.ros__parameters.FollowPath.robot_height_min: 0.05
    controller_server.ros__parameters.FollowPath.robot_height_max: 0.40

    controller_server.ros__parameters.FollowPath.max_vel_x:     0.22
    controller_server.ros__parameters.FollowPath.min_vel_x:     0.04
    controller_server.ros__parameters.FollowPath.max_vel_theta: 1.0
    controller_server.ros__parameters.FollowPath.acc_lim_x:     0.4
    controller_server.ros__parameters.FollowPath.acc_lim_theta: 1.2

    # No 3D sensor on TB3 — disable volumetric clearance
    controller_server.ros__parameters.FollowPath.pointcloud_topic: "/scan_3d"
    controller_server.ros__parameters.FollowPath.use_3d_clearance: false

  # ──────────────────────────────────────────────────────────────────────────
  # Stock Nav2 MPPI controller
  # ──────────────────────────────────────────────────────────────────────────
  mppi:
    controller_server.ros__parameters.FollowPath.vx_max:  0.22
    controller_server.ros__parameters.FollowPath.vx_min: -0.15
    controller_server.ros__parameters.FollowPath.wz_max:  1.0
    controller_server.ros__parameters.FollowPath.ax_max:  2.5
    controller_server.ros__parameters.FollowPath.ax_min: -2.5

  # ──────────────────────────────────────────────────────────────────────────
  # Stock Nav2 DWB controller
  # ──────────────────────────────────────────────────────────────────────────
  dwb:
    controller_server.ros__parameters.FollowPath.max_vel_x:     0.22
    controller_server.ros__parameters.FollowPath.min_vel_x:     0.0
    controller_server.ros__parameters.FollowPath.max_vel_theta: 1.0
    controller_server.ros__parameters.FollowPath.max_speed_xy:  0.22

    controller_server.ros__parameters.FollowPath.acc_lim_x:       2.5
    controller_server.ros__parameters.FollowPath.acc_lim_theta:   3.2
    controller_server.ros__parameters.FollowPath.decel_lim_x:    -2.5
    controller_server.ros__parameters.FollowPath.decel_lim_theta: -3.2
