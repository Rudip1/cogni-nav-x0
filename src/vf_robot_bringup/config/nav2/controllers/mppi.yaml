# =============================================================================
# vf_robot_bringup / config / nav2 / controllers / mppi.yaml
# =============================================================================
# Stock Nav2 MPPI Controller — primary thesis baseline
#
# This is the canonical Nav2 MPPI configuration with the 8 default critics.
# It is the apples-to-apples baseline against which the VF Robot Controller
# (vf_fixed and vf_inference) is compared.
#
# WHY THIS IS THE PRIMARY BASELINE (not DWB):
#   The VF Robot Controller is itself an MPPI variant. Comparing it to DWB
#   would conflate two effects: (1) MPPI vs Dynamic Window, and (2) our
#   custom critic set + meta-network vs stock critics + fixed weights.
#   By comparing against stock Nav2 MPPI, the only variables left are our
#   contributions: the 10 custom critics and (in inference mode) the
#   meta-critic neural network.
#
# CRITIC SET (stock Nav2 — 8 critics):
#   - ConstraintCritic       penalizes velocity constraint violations
#   - GoalCritic             encourages reaching the goal
#   - GoalAngleCritic        encourages correct goal heading
#   - PreferForwardCritic    penalizes backwards motion
#   - CostCritic             penalizes high-cost (close to obstacles) cells
#   - PathAlignCritic        encourages alignment with the global path
#   - PathFollowCritic       encourages following the global path
#   - PathAngleCritic        encourages matching the path's heading
#
# WHAT THE VF CONTROLLER ADDS (not in stock MPPI):
#   - VolumetricCritic, DynamicObstacleCritic, SmoothnessCritic,
#     VelocityCritic, CorridorCritic, ClearanceCritic, OscillationCritic
#   - GCF (Geometric Complexity Field) for context-aware tightness scoring
#   - Meta-critic neural network for runtime weight adaptation
#
# MERGE CONTRACT:
#   Fragment. Merged with nav2_base.yaml by compose_params.py.
#   Provides ONLY the FollowPath: block.
#
# PARAMETER SOURCE OF TRUTH:
#   nav2_mppi_controller/README.md and the canonical nav2_bringup
#   nav2_params.yaml. Tuned values match the Nav2 reference defaults
#   (TB3-class robot). Velocity-related params are overridden by the
#   robot profile via compose_params.
# =============================================================================

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"

      # ── MPPI optimizer ─────────────────────────────────────────────────
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      iteration_count: 1
      temperature: 0.3
      gamma: 0.015

      # ── Motion model ───────────────────────────────────────────────────
      motion_model: "DiffDrive"

      # ── Velocity/acceleration limits (overridden by robot profile) ─────
      vx_max:  0.5
      vx_min: -0.35
      vy_max:  0.0      # diff drive: no lateral motion
      wz_max:  1.9
      ax_max:  3.0
      ax_min: -3.0
      ay_max:  3.0
      ay_min: -3.0
      az_max:  3.5

      # ── Sampling noise (std deviations) ────────────────────────────────
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4

      # ── Visualization ──────────────────────────────────────────────────
      visualize: true
      regenerate_noises: true

      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      AckermannConstraints:
        min_turning_r: 0.2

      # ── Critics ─────────────────────────────────────────────────────────
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4

      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
