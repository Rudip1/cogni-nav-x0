# =============================================================================
# vf_robot_bringup / config / nav2 / localization / amcl.yaml
# =============================================================================
# Adaptive Monte Carlo Localization fragment.
#
# This file is loaded ONLY when bringup_launch.py is invoked with
# `localization:=amcl`. In all other localization modes (rtabmap_slam,
# rtabmap_loc, slam_toolbox), the map→odom transform is published by
# the corresponding SLAM system and AMCL is not started at all — this
# fragment is then never composed in.
#
# REQUIRED EXTERNAL INPUT:
#   - A 2D occupancy grid map (.yaml + .pgm) loaded by map_server.
#     The map filename is set at launch time by localization_launch.py
#     from the user's `map:=` argument.
#   - A /scan topic (provided by vf_robot_slam/depth_to_scan).
#   - An odom→base_footprint transform (provided by Gazebo or robot driver).
#
# WHAT AMCL PUBLISHES:
#   - map→odom transform (~10 Hz, after particle filter converges)
#   - /particle_cloud  (for visualization in RViz)
#   - /amcl_pose       (estimated pose with covariance)
#
# INITIAL POSE:
#   AMCL needs an initial pose hint. The user provides it via RViz's
#   "2D Pose Estimate" button, which publishes to /initialpose. Without
#   that, AMCL will use the global map origin and the particle filter
#   will likely diverge.
#
# MERGE CONTRACT:
#   Fragment. Composed on top of nav2_base.yaml ⊕ controllers/<choice>.yaml
#   when localization == "amcl".
#
# Defaults below are taken from the canonical TurtleBot3 nav2_params.yaml
# AMCL section. The robot profile applies the `base_footprint` frame name
# via the always-applied `rewrites:` block (see virofighter.yaml).
# =============================================================================

amcl:
  ros__parameters:
    # ── Motion model noise (alphas — see Probabilistic Robotics, Thrun) ──
    alpha1: 0.2          # rotation noise from rotation
    alpha2: 0.2          # rotation noise from translation
    alpha3: 0.2          # translation noise from translation
    alpha4: 0.2          # translation noise from rotation
    alpha5: 0.2          # strafe noise (omnidirectional models only)

    # ── Frames (overridden by robot profile) ─────────────────────────────
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    # ── Motion model ─────────────────────────────────────────────────────
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # ── Particle filter ──────────────────────────────────────────────────
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05         # KLD-sampling error bound
    pf_z: 0.99           # KLD-sampling confidence
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    update_min_a: 0.2    # min angular movement before update (rad)
    update_min_d: 0.25   # min linear movement before update (m)

    # ── Sensor model (likelihood field) ──────────────────────────────────
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0
    laser_min_range: -1.0
    max_beams: 60
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    lambda_short: 0.1

    # ── Beam skipping (faster updates in dense scans) ────────────────────
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # ── Output ───────────────────────────────────────────────────────────
    save_pose_rate: 0.5
    tf_broadcast: true
    transform_tolerance: 1.0

    # ── Topic ────────────────────────────────────────────────────────────
    scan_topic: scan
