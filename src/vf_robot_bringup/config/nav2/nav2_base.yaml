# =============================================================================
# vf_robot_bringup / config / nav2 / nav2_base.yaml
# =============================================================================
# Controller-agnostic, ROBOT-agnostic Nav2 skeleton.
#
# This file is NOT loaded by Nav2 directly. It is merged at launch time with:
#     ⊕ controllers/<choice>.yaml    (FollowPath: block)
#     ⊕ localization/amcl.yaml       (amcl: block, if localization == "amcl")
#     ⊕ robot profile rewrites       (footprint, frames, vel limits, topics)
# by vf_robot_bringup/launch_utils/compose_params.py.
#
# The resulting merged file is written to /tmp/ and passed to every Nav2
# node via params_file=.
#
# WHAT LIVES HERE:
#   - bt_navigator           (behavior tree server)
#   - controller_server      (everything EXCEPT the FollowPath: plugin block)
#   - planner_server         (global planner)
#   - smoother_server        (path smoother)
#   - behavior_server        (recovery behaviors: spin, backup, wait)
#   - waypoint_follower      (follow a list of waypoints)
#   - velocity_smoother      (cmd_vel smoother)
#   - collision_monitor      (safety layer between smoother and robot)
#   - map_server             (loads .pgm/.yaml, published on /map)
#   - map_saver              (saves /map to disk)
#   - local_costmap          (local obstacle layer)
#   - global_costmap         (global obstacle layer)
#
# WHAT DOES NOT LIVE HERE:
#   - FollowPath: block      → controllers/<choice>.yaml
#   - amcl: block            → localization/amcl.yaml
#   - footprint, frames,
#     velocity limits,
#     sensor topics          → applied via robot profile rewrites
#
# DEFAULTS: values here are safe TurtleBot3-class defaults. The robot profile
# overrides any value that is actually robot-specific. Any value a profile
# does NOT override is used as-is.
#
# CONVENTIONS:
#   - Uses `FollowPath` as the single controller plugin name (matches Nav2 BT)
#   - Uses `base_footprint` as default base frame (ViroFighter + TB3 both use it)
#   - use_sim_time is NOT set here — it is injected by the launch file so the
#     same YAML works for both sim and real-robot runs
# =============================================================================


# -----------------------------------------------------------------------------
# Behavior Tree Navigator
# -----------------------------------------------------------------------------
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters: {}

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters: {}


# -----------------------------------------------------------------------------
# Controller Server
# -----------------------------------------------------------------------------
# NOTE: the `FollowPath:` block is intentionally omitted. It is injected by
# the controller fragment (controllers/<choice>.yaml) at compose time.
controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # FollowPath: is injected by the controller fragment at compose time.
    # It MUST define at least:
    #   plugin: "<fully::qualified::PluginName>"
    # plus whatever params that plugin expects.


# -----------------------------------------------------------------------------
# Planner Server — global path planner (NavFn by default)
# -----------------------------------------------------------------------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true


# -----------------------------------------------------------------------------
# Smoother Server — path smoothing after the planner
# -----------------------------------------------------------------------------
smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true


# -----------------------------------------------------------------------------
# Behavior Server — recovery behaviors
# -----------------------------------------------------------------------------
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      - "spin"
      - "backup"
      - "drive_on_heading"
      - "assisted_teleop"
      - "wait"
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2


# -----------------------------------------------------------------------------
# Waypoint Follower — follow a list of poses
# -----------------------------------------------------------------------------
waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200


# -----------------------------------------------------------------------------
# Velocity Smoother — smooths cmd_vel before it reaches the robot
# -----------------------------------------------------------------------------
# Topic wiring (set in navigation_launch.py via remaps):
#   input:  cmd_vel         (from controller_server)
#   output: cmd_vel_smoothed (to collision_monitor)
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


# -----------------------------------------------------------------------------
# Collision Monitor — safety layer between velocity_smoother and the robot
# -----------------------------------------------------------------------------
# Topic wiring:
#   input:  cmd_vel_smoothed  (from velocity_smoother)
#   output: cmd_vel           (to the robot's base controller)
#
# If a collision is predicted within `time_before_collision` seconds along
# the current velocity command, the monitor will override cmd_vel with a
# safer value (stop or slow).
collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 2.0
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.15
      max_height: 2.0
      enabled: true


# -----------------------------------------------------------------------------
# Map Server — loads .pgm/.yaml, publishes /map (AMCL mode only)
# -----------------------------------------------------------------------------
# The yaml_filename is set at launch time by localization_launch.py from
# the `map:=` argument. Leaving it blank here is intentional — if a user
# launches in AMCL mode without providing map:=, AMCL will fail to start,
# which is the correct behavior.
map_server:
  ros__parameters:
    yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true


# -----------------------------------------------------------------------------
# Local Costmap — rolling window centered on the robot
# -----------------------------------------------------------------------------
# Default shape: 3m × 3m rolling window, voxel layer from /scan.
# Robot profile overrides: robot_base_frame, robot_radius OR footprint,
# width/height, inflation_radius, scan topic and ranges.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # Either robot_radius OR footprint — robot profile rewrites whichever
      # fits the robot. Nav2 uses footprint if non-empty, else robot_radius.
      robot_radius: 0.22
      footprint: ""
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      always_send_full_costmap: true


# -----------------------------------------------------------------------------
# Global Costmap — full map-sized costmap
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      # Either robot_radius OR footprint — see local_costmap above.
      robot_radius: 0.22
      footprint: ""
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true


# -----------------------------------------------------------------------------
# Robot State Publisher — not launched by Nav2, but some examples set params here
# -----------------------------------------------------------------------------
# (Intentionally not set here. RSP is launched by vf_robot_gazebo /
#  vf_robot_description and reads its own parameters.)
