# RTAB-Map Common Parameters for ViroFighter UVC-1
# These parameters are shared between SLAM and Localization modes

rtabmap:
  ros__parameters:
    # Frame configuration
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"
    publish_tf: true

    # General
    queue_size: 10
    approx_sync: true
    sync_queue_size: 10

    # Subscription flags (overridden per mode/camera config)
    subscribe_depth: false
    subscribe_rgb: false
    subscribe_rgbd: false
    subscribe_stereo: false
    subscribe_scan: false
    subscribe_scan_cloud: false
    subscribe_odom_info: false

    # Grid map (2D occupancy grid for Nav2)
    Grid/CellSize: "0.05"
    Grid/RangeMin: "0.0"
    Grid/RangeMax: "6.0"

    # Memory management
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"

    # Optimizer
    Optimizer/Strategy: "1"
    Optimizer/Iterations: "20"
    Optimizer/Slam2D: "true"

    # Registration
    Reg/Strategy: "0"
    Reg/Force3DoF: "true"

    # Visual features
    Vis/MinInliers: "15"
    Vis/InlierDistance: "0.1"
    Vis/MaxFeatures: "500"
    Vis/FeatureType: "8"

    # Loop closure
    Rtabmap/DetectionRate: "1.0"
    Rtabmap/TimeThr: "0.0"
    RGBD/LoopClosureReextractFeatures: "true"
    RGBD/OptimizeMaxError: "3.0"

    # Mapping thresholds
    RGBD/LinearUpdate: "0.1"
    RGBD/AngularUpdate: "0.1"
    RGBD/CreateOccupancyGrid: "true"
