# RTAB-Map Localization Mode Parameters
# Use this for navigating in a previously mapped environment

rtabmap:
  ros__parameters:
    # Mode flag
    Mem/IncrementalMemory: "false"
    Mem/InitWMWithAllNodes: "true"

    # Localization-specific settings
    Rtabmap/StartNewMapOnLoopClosure: "false"
    RGBD/SavedLocalizationIgnored: "false"

    # Loop closure for localization
    Rtabmap/LoopThr: "0.09"
    Rtabmap/LoopRatio: "0.0"

    # Don't keep new images
    Mem/ImageKept: "false"
    Mem/STMSize: "10"
    Mem/RehearsalSimilarity: "0.6"

    # Optimize from last known position
    RGBD/OptimizeFromGraphEnd: "true"
    RGBD/LocalBundleOnLoopClosure: "false"

    # Keep the map static
    RGBD/LinearUpdate: "0.0"
    RGBD/AngularUpdate: "0.0"

    # Faster detection
    Rtabmap/DetectionRate: "2.0"
