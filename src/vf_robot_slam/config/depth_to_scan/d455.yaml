# depthimage_to_laserscan Parameters for D455 Camera
# 
# D455 is mounted at 0.429m height, facing REAR (horizontal)
# This is the RECOMMENDED camera for laser scan / obstacle detection
# because it's at a good height for detecting obstacles at navigation level.

# D455 specific
output_frame_id: "camera_d455_depth_optical_frame"

# Input topics (remapped in launch file)
# depth: /d455/depth/d455_depth/depth/image_raw
# depth_camera_info: /d455/depth/d455_depth/depth/camera_info

# Output topic (remapped in launch file)
# scan: /scan (single camera) or /scan_d455 (dual camera)

# Standard parameters work well for D455
range_min: 0.6
range_max: 6.0
scan_height: 1
