controller_server:
  ros__parameters:
    controller_frequency: 20.0
    controller_plugins: ["VFController"]

    VFController:
      plugin: "vf_robot_controller::VFRobotController"

      # ── Optimizer ─────────────────────────────────────────────────────────
      num_samples: 500          # increase to 800 for harder scenarios
      num_iterations: 3
      horizon_time: 2.0
      control_frequency: 20.0
      temperature: 0.3          # lower = greedier selection

      # ── B-spline trajectory ───────────────────────────────────────────────
      spline_degree: 3          # cubic, do not change
      min_knots: 6
      max_knots: 20             # up to 20 control points in cluttered rooms
      knot_density_scale: 1.0

      # ── GCF (core novel component) ────────────────────────────────────────
      gcf_radius: 1.5           # m — local query window
      gcf_weight_2d: 0.4        # weight for 2D clearance component
      gcf_weight_clutter: 0.3   # weight for clutter density (chair legs etc.)
      gcf_weight_volumetric: 0.3 # weight for 3D clearance
      gcf_clutter_radius: 0.6   # m — radius to count clutter clusters
      gcf_update_rate: 10.0     # Hz — GCF update frequency

      # ── Robot footprint (EDIT for your actual robot) ──────────────────────
      robot_length: 0.6         # m
      robot_width: 0.4          # m
      robot_height_min: 0.05    # m — lowest robot body point
      robot_height_max: 1.2     # m — highest robot body point
      safety_inflation: 0.05    # m — hard safety margin

      # ── Velocity limits ───────────────────────────────────────────────────
      max_vel_x: 0.5            # m/s in open spaces
      min_vel_x: 0.05           # m/s minimum
      max_vel_theta: 1.0        # rad/s
      min_vel_theta: 0.0
      max_speed_in_tight: 0.15  # m/s when GCF > tight_gcf_threshold
      tight_gcf_threshold: 0.6  # GCF value that triggers tight mode
      acc_lim_x: 0.5
      acc_lim_theta: 1.5

      # ── Critics to load ───────────────────────────────────────────────────
      critics:
        - "ObstacleCritic"
        - "VolumetricCritic"
        - "DynamicObstacleCritic"
        - "PathFollowCritic"
        - "SmoothnessCritic"
        - "GoalCritic"
        - "VelocityCritic"

      # ── Critic weight adaptation driven by GCF ────────────────────────────
      obstacle_weight_open: 1.0
      obstacle_weight_tight: 3.0   # 3x more obstacle avoidance in tight spaces
      path_follow_weight_open: 2.0
      path_follow_weight_tight: 0.5 # less path-following in tight/cluttered

      # ── Per-critic parameters ─────────────────────────────────────────────
      ObstacleCritic:
        repulsion_radius: 0.5

      VolumetricCritic:
        min_clearance: 0.08   # m — minimum 3D clearance (chair leg detection)

      DynamicObstacleCritic:
        collision_radius: 0.6
        prediction_horizon: 2.0

      PathFollowCritic:
        max_lateral_dev: 1.0
        heading_weight: 0.3

      SmoothnessCritic:
        max_curvature: 2.0

      GoalCritic:
        goal_activation_dist: 1.5

      VelocityCritic:
        slowness_penalty_weight: 0.1

      # ── Noise for sampling ────────────────────────────────────────────────
      noise_sigma_x: 0.1        # m — open-space noise (auto-reduced in tight)
      noise_sigma_theta: 0.2    # rad

      # ── Visualization ─────────────────────────────────────────────────────
      visualize_trajectories: true
      visualize_gcf: true
      visualize_max_trajectories: 50

      # ── 3D pointcloud topic ───────────────────────────────────────────────
      # Set to your actual 3D sensor topic.
      # Typical options:
      #   /scan_3d          — 3D LiDAR
      #   /camera/depth/points — RGBD camera (after filtering)
      #   /velodyne_points   — Velodyne
      pointcloud_topic: "/scan_3d"
      use_3d_clearance: true
